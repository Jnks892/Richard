<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Инженерные войска России | 20 сигарет до дембеля</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ФОН ВАШЕ ФОТО (army-bg.jpg) -->
    
    <div class="container">
        <!-- Верхняя панель с флагами -->
        <div class="flags-bar">
            <div class="flag-rf">
                <div class="rf-stripe white"></div>
                <div class="rf-stripe blue"></div>
                <div class="rf-stripe red"></div>
            </div>
        </div>

        <!-- НОВАЯ НАДПИСЬ -->
        <div class="from-who">
            Боссу канцелярии Ричарду от товарищей ИТР
        </div>

        <!-- Шеврон -->
        <div class="chevron">
            <div class="ribbon-left"></div>
            <div class="chevron-text">ИНЖЕНЕРНЫЕ ВОЙСКА</div>
            <div class="ribbon-right"></div>
        </div>

        <!-- Главный блок с обратным отсчётом -->
        <div class="countdown-block">
            <div class="star-left">★</div>
            <div class="countdown-inner">
                <div class="countdown-label">ДО ДЕМБЕЛЯ ОСТАЛОСЬ</div>
                <div class="days-counter">
                    <span id="daysLeft">20</span>
                    <span class="days-unit">СИГАРЕТ</span>
                </div>
            </div>
            <div class="star-right">★</div>
        </div>

        <!-- Сетка пожеланий -->
        <div class="grid" id="wishesGrid"></div>

        <!-- Нижний колонтитул -->
        <div class="footer">
            <div class="footer-stars">★  СЛУЖУ РОССИИ  ★</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
